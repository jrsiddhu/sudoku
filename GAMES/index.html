<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N games | Sudoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>N games</h1>
            <h2>SUDOKU</h2>
        </header>

        <section class="game-stats">
            <div class="stat-item" id="timer-container">
                <span class="label">Time:</span>
                <span id="timer">00:00</span>
            </div>
            <div class="stat-item" id="lives-container">
                <span class="label">Lives:</span>
                <span id="lives">❤️❤️❤️</span>
            </div>
            <div class="stat-item" id="difficulty-container">
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </section>

        <main class="game-area">
            <div id="sudoku-board" class="sudoku-board">
                <!-- Cells generated by JS -->
            </div>
        </main>

        <section class="controls">
            <div class="number-pad">
                <button class="n-btn" data-value="1">1</button>
                <button class="n-btn" data-value="2">2</button>
                <button class="n-btn" data-value="3">3</button>
                <button class="n-btn" data-value="4">4</button>
                <button class="n-btn" data-value="5">5</button>
                <button class="n-btn" data-value="6">6</button>
                <button class="n-btn" data-value="7">7</button>
                <button class="n-btn" data-value="8">8</button>
                <button class="n-btn" data-value="9">9</button>
                <button class="action-btn" id="erase-btn">Erase</button>
            </div>
            <button class="new-game-btn" id="new-game-btn">New Game</button>
        </section>

        <!-- Modals for Game Over/Win -->
        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title">Game Over</h3>
                <p id="modal-message">Better luck next time!</p>
                <button id="modal-restart">Try Again</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
